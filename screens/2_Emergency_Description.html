<p class="font-body-md text-body-md text-on-surface-variant">Provide clear details or use the microphone to speak.</p>
</section>
<!-- Input Section -->
<section class="flex flex-col gap-stack-md bg-surface-container-lowest p-6 rounded-[24px] shadow-sm border border-outline-variant/50">
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface" for="emergency-input">Emergency Description</label>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-[16px] p-4 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none min-h-[160px] resize-y shadow-inner transition-shadow" id="emergency-input" placeholder="My father has chest pain, sweating and difficulty breathing."></textarea>
</div>

<div class="flex flex-col items-center justify-center pt-4 border-t border-outline-variant/30">

<span class="material-symbols-outlined text-[48px] transition-transform group-hover:scale-110" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<span class="mt-3 font-label-md text-label-md text-primary font-medium tracking-wide">TAP TO SPEAK</span>
</div>
</section>
<!-- Quick Select Chips -->

<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-md">Suggested Symptoms</h3>
<div class="flex flex-wrap gap-3">
