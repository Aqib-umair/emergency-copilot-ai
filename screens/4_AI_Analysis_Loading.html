<!--

-->
<body class="bg-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">
<!-- Ambient Background Lighting -->

<div class="absolute inset-0 rounded-full border border-primary-fixed animate-ring delay-2000"></div>

                        monitor_heart
                    </span>
</div>
</div>
<!-- Orbiting AI Indicator -->

</div>

<!-- Typography & Sequential Messaging -->
<div class="flex flex-col items-center min-h-[96px] w-full">
<h1 class="font-headline-md text-headline-md md:font-headline-lg text-headline-lg text-on-surface mb-stack-sm transition-opacity duration-500 opacity-100" id="loading-message">
                Analyzing symptoms...
            </h1>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px] animate-spin">
                    progress_activity
                </span>
<p class="font-body-md text-body-md">
                    Please do not close this app
                </p>
</div>
</div>
<!-- Structured Progress Indicator -->
<div class="w-full max-w-[240px] mt-stack-lg">
<div class="h-1.5 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-[200ms] ease-linear" id="progress-bar" style="width: 5%;"></div>
</div>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const messages = [
                'Analyzing symptoms...',
                'Assessing urgency...',
                'Preparing guidance...',
                'Finding nearby hospitals...'
            ];
            
            const messageElement = document.getElementById('loading-message');
            const progressBar = document.getElementById('progress-bar');
            
            let currentMessageIndex = 0;
            const totalDuration = 10000; // 10 seconds total simulation
            const messageIntervalTime = totalDuration / messages.length;
            
            // Handle Message Cycling
            const messageInterval = setInterval(() => {
                // Fade out
                messageElement.style.opacity = '0';
                
                setTimeout(() => {
                    currentMessageIndex++;
                    if (currentMessageIndex < messages.length) {
                        messageElement.textContent = messages[currentMessageIndex];
                        // Fade in
                        messageElement.style.opacity = '1';
                    } else {
                        // Keep last message visible and clear interval
                        clearInterval(messageInterval);
                        messageElement.style.opacity = '1';
                    }
                }, 500); // Wait for transition duration
            }, messageIntervalTime);

            // Handle Progress Bar
            let progress = 5;
            const updateRate = 100; // ms
            const progressStep = (95 / (totalDuration / updateRate));
            
            const progressInterval = setInterval(() => {
                progress += progressStep;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    
                    // Optional: Trigger a redirect or change state here in a real app
                    // setTimeout(() => { alert('Analysis Complete'); }, 500);
                }
                progressBar.style.width = `${progress}%`;
            }, updateRate);
        });
    </script>
