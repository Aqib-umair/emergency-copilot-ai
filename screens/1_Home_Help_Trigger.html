<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
            color: #0b1c30;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom Breathing Pulse Animation */
        @keyframes breathe-pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 40, 142, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px 20px rgba(0, 40, 142, 0.2);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 40, 142, 0);
            }
        }

        .btn-breathe {
            animation: breathe-pulse 3s infinite ease-in-out;
        }
        
        .ripple-bg {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(220,233,255,1) 0%, rgba(220,233,255,0) 70%);
            z-index: 0;
            animation: pulse-ring 3s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background h-screen flex flex-col overflow-hidden relative">
<!-- TopAppBar (From JSON) -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm dark:shadow-none fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-touch-target-min">

<!-- Hidden Language Dropdown (Fulfilling prompt request cleanly within JSON structure) -->
<div class="absolute top-full left-0 mt-1 w-32 bg-surface-container-lowest rounded-lg shadow-lg border border-outline-variant hidden group-hover:flex flex-col overflow-hidden">
<div class="px-4 py-2 hover:bg-surface-container text-body-md font-body-md cursor-pointer text-on-surface">English</div>
<div class="px-4 py-2 hover:bg-surface-container text-body-md font-body-md cursor-pointer text-on-surface">Hindi</div>
<div class="px-4 py-2 hover:bg-surface-container text-body-md font-body-md cursor-pointer text-on-surface">Telugu</div>
<div class="px-4 py-2 hover:bg-surface-container text-body-md font-body-md cursor-pointer text-on-surface">Tamil</div>
</div>
</button>
<!-- Headline -->
<div class="flex flex-col items-center justify-center">
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed text-center">
                Emergency Copilot AI
            </h1>
<span class="text-label-md font-label-md text-on-surface-variant/80 mt-0.5">Help in Seconds, Not Minutes</span>
</div>
<!-- Trailing Icon: Account -->
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-colors text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 mt-[72px] mb-[72px] flex flex-col items-center justify-center px-margin-mobile relative z-10">
<!-- Hero Section: Animated Help Button -->
<div class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto relative">
<div class="relative flex items-center justify-center w-64 h-64 mb-8">
<!-- Background ambient ripple -->
<div class="ripple-bg"></div>
<div class="ripple-bg" style="animation-delay: 1.5s;"></div>
<!-- Main Interactive Button -->
<button class="relative z-10 w-48 h-48 rounded-full bg-gradient-to-b from-primary to-primary-container text-on-primary shadow-lg flex flex-col items-center justify-center btn-breathe hover:brightness-110 active:scale-95 transition-all duration-150 border-4 border-surface-container-highest">
<span class="text-5xl mb-2">🚑</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-wider">HELP</span>
</button>
</div>
<!-- Instruction Text -->
<p class="font-body-lg text-body-lg text-on-surface text-center mb-12">
                Tap to describe the emergency
            </p>
</div>
<!-- Disclaimer -->
<div class="w-full max-w-md mx-auto text-center px-4 pb-4">
<p class="font-label-md text-label-md text-on-surface-variant flex items-start justify-center gap-2">
<span class="material-symbols-outlined text-[16px] mt-0.5 text-error">info</span>
<span class="text-left">AI guidance is for preliminary support and is not a substitute for professional medical care. <strong>Call local emergency services immediately in critical situations.</strong></span>
</p>
</div>
